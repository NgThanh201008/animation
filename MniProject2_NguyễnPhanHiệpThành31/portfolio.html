<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Sản phẩm | Dự án Web Animation</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <header class="sticky-header">
        <nav class="navbar container">
            <div class="logo">MY WEB</div>
            <ul class="nav-links">
                <li><a href="index.html">Trang chủ</a></li>
                <li><a href="services.html">Dịch vụ</a></li>
                <li><a href="portfolio.html" class="active">Sản phẩm</a></li>
                <li><a href="contact.html">Liên hệ</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <h2 class="section-title">Dự án tiêu biểu</h2>
        <div class="swiper mySwiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide"><img src="https://picsum.photos/1200/500?random=11"></div>
                <div class="swiper-slide"><img src="https://picsum.photos/1200/500?random=12"></div>
            </div>
            <div class="swiper-pagination"></div>
        </div>

        <h2 class="section-title">Bộ sưu tập (Masonry)</h2>
        <div class="masonry-gallery">
            <div class="masonry-item"><img src="https://picsum.photos/400/600?random=1"></div>
            <div class="masonry-item"><img src="https://picsum.photos/400/300?random=2"></div>
            <div class="masonry-item"><img src="https://picsum.photos/400/500?random=3"></div>
            <div class="masonry-item"><img src="https://picsum.photos/400/400?random=4"></div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>
